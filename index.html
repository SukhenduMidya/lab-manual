<!DOCTYPE html>
<html>

<head>

    <title>Lab Manual</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#5b7cfa,#7c4dff);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            width:400px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom:30px;
            color:#222;
        }

        .btn{
            display:block;
            margin-top:20px;
            padding:15px;
            background:#06b6d4;
            color:black;
            text-decoration:none;
            border-radius:10px;
            font-size:20px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#22d3ee;
            transform:scale(1.03);
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>📘 Lab Manuals</h1>

        <a class="btn" href="oops_manual.pdf" download>

        </a>

        <a class="btn" href="os_manual.pdf" download>

        </a>

    </div>

</html>
